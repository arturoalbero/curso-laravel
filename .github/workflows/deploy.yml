name: Deploy to InfinityFree
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PHP with composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, intl
          tools: composer

      - name: Install dependencies with composer
        working-directory: ./src
        run: composer install --no-dev --optimize-autoloader

      # 3. Subir archivos públicos
      - name: Upload public files to htdocs/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./src/public/
          server-dir: htdocs/                        # ✅ Sin "/" inicial
          dangerous-clean-slate: false
          state-name: .ftp-state-public.json         # ✅ Archivo de estado separado
          log-level: verbose                         # ✅ Ver qué sube y qué no

      # 4. Preparar src sin public
      - name: Prepare src without public
        run: rsync -av --exclude='public' src/ temp_src/   # ✅ Más fiable que extglob

      # 5. Crear .env dentro de temp_src antes de subirlo
      - name: Create .env file
        run: |
          cat > temp_src/.env << 'ENVEOF'
          APP_NAME=Laravel
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          LOG_CHANNEL=stack
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          SESSION_DRIVER=file
          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local
          QUEUE_CONNECTION=sync
          CACHE_STORE=file

          MAIL_MAILER=log
          MAIL_FROM_ADDRESS="hello@example.com"
          MAIL_FROM_NAME="${APP_NAME}"
          ENVEOF

      # 6. Subir src (con .env incluido) a htdocs/src/
      - name: Upload src to htdocs/src/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./temp_src/
          server-dir: htdocs/src/                    # ✅ Sin "/" inicial
          dangerous-clean-slate: false
          state-name: .ftp-state-src.json            # ✅ Archivo de estado separado
          exclude: |
            **/.git*
            **/tests/**
            **/node_modules/**
          log-level: verbose                         # ✅ Ver qué sube y qué no
